name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install ruff==0.7.1
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements-dev.txt
      - name: Pytest (with sys.path)
        run: PYTHONPATH=. pytest -v

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    continue-on-error: true  # soft — nu blocăm CI pe v0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements-dev.txt
      - name: Mypy
        run: mypy scrapers schemas scripts
        continue-on-error: true

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Validate data if present
        run: |
          if [ -f data/v1/deputati/legislatura-2024.json ]; then
            PYTHONPATH=. python scripts/validate_data.py
          else
            echo "No data file — skipping."
          fi
