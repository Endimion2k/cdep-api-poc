name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check (soft — warnings only pe v0.1)
        run: mypy scrapers schemas scripts --install-types --non-interactive || true
        continue-on-error: true

      - name: Pytest
        run: pytest -q

      - name: Validate data (dacă există fișierul)
        run: |
          if [ -f data/v1/deputati/legislatura-2024.json ]; then
            python scripts/validate_data.py
          else
            echo "No data file yet — skipping validation."
          fi
