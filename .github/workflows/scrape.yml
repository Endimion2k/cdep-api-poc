name: Scrape cdep.ro

# Rulează zilnic la 04:00 UTC. Self-hosted runner pe Windows (PC RO).
# Folosește Python sistem (NU actions/setup-python — antivirus blochează instalator).
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      leg:
        description: "Legislatura (anul începerii)"
        default: "2024"
        required: false
      limit:
        description: "Limit nr. deputați (debug; gol = toți)"
        default: ""
        required: false

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape-deputati:
    runs-on: [self-hosted, cdep, windows]
    timeout-minutes: 20

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verifică Python disponibil
        run: |
          python --version
          python -c "import sys; assert sys.version_info >= (3, 11), 'Python 3.11+ required, got ' + str(sys.version_info)"

      - name: Install runtime dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run scraper — deputați
        env:
          CDEP_SCRAPE_WORKERS: "2"
          CDEP_HTTP_THROTTLE_SECONDS: "0.5"
        run: |
          $leg = if ('${{ github.event.inputs.leg }}') { '${{ github.event.inputs.leg }}' } else { '2024' }
          $limitArg = if ('${{ github.event.inputs.limit }}') { "--limit ${{ github.event.inputs.limit }}" } else { "" }
          python scripts/run_deputati.py --leg $leg $limitArg --verbose

      - name: Validate data
        run: python scripts/validate_data.py

      - name: Commit changes if any
        run: |
          git config user.name "cdep-api-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No data changes - skipping commit."
          } else {
            $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd")
            git commit -m "data: daily scrape $date"
            git push
            Write-Host "Committed and pushed."
          }
