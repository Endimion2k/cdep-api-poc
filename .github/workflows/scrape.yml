name: Scrape cdep.ro

# Rulează zilnic la 04:00 UTC. Folosește self-hosted runner pe PC-ul lui Cătălin
# (IP RO) ca să poată accesa cdep.ro. Folosește Python-ul deja instalat pe sistem
# (NU actions/setup-python — antivirusul blochează instalatorul lui).
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      leg:
        description: "Legislatura (anul începerii)"
        default: "2024"
        required: false
      limit:
        description: "Limit nr. deputați (debug; gol = toți)"
        default: ""
        required: false

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape-deputati:
    runs-on: [self-hosted, cdep, windows]
    timeout-minutes: 20

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verifică Python disponibil
        run: |
          python --version
          python -c "import sys; assert sys.version_info >= (3, 11), f'Python 3.11+ required, got {sys.version_info}'"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper — deputați
        env:
          CDEP_SCRAPE_WORKERS: "2"
          CDEP_HTTP_THROTTLE_SECONDS: "0.5"
        run: |
          LEG="${{ github.event.inputs.leg || '2024' }}"
          LIMIT_ARG=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            LIMIT_ARG="--limit ${{ github.event.inputs.limit }}"
          fi
          python scripts/run_deputati.py --leg "$LEG" $LIMIT_ARG --verbose

      - name: Validate data
        run: python scripts/validate_data.py

      - name: Commit changes if any
        run: |
          git config user.name "cdep-api-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "data: daily scrape ${DATE}"
            git push
            echo "Committed and pushed."
          fi
