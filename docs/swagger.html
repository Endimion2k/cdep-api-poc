<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swagger UI — Camera Deputaților API</title>
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
<style>
body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.topbar{background:#1D9E75!important}
.topbar-wrapper .link{pointer-events:none}
.swagger-ui .info .title{color:#1a1a1a}
.back-link{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:#f8f8f6;border-bottom:1px solid #e0deda;font-size:13px;color:#555;text-decoration:none;font-family:-apple-system,sans-serif}
.back-link:hover{color:#1a1a1a;background:#f0f0ee}
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Înapoi la documentație</a>
<div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
window.onload=function(){
  SwaggerUIBundle({
    url:'../api/openapi.yaml',
    dom_id:'#swagger-ui',
    deepLinking:true,
    presets:[SwaggerUIBundle.presets.apis,SwaggerUIBundle.SwaggerUIStandalonePreset],
    layout:'BaseLayout',
    defaultModelsExpandDepth:1,
    defaultModelExpandDepth:1,
    docExpansion:'list'
  });
};
</script>
</body>
</html>
